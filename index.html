<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OFICINA - S.I.A.F</title>
    <style>
        /* Eliminar márgenes y que los fondos lleguen de extremo a extremo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        /* Contenedor principal que simula una tarjeta o formulario */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Cada bloque con fondo de extremo a extremo (ocupa todo el ancho del contenedor) */
        .seccion {
            width: 100%;
            padding: 10px 15px;
            border-bottom: 1px solid #ccc;
        }

        /* Fondo azul claro para ciertas secciones (como en la imagen) */
        .fondo-azul {
            background-color: #d9eaff;
        }

        /* Fondo gris claro para otras */
        .fondo-gris {
            background-color: #f0f0f0;
        }

        /* Títulos y textos */
        .titulo-oficina {
            font-size: 24px;
            font-weight: bold;
        }

        .unidad {
            font-size: 16px;
            font-weight: bold;
        }

        .observacion {
            font-size: 14px;
            color: #333;
            margin-top: 5px;
        }

        /* Grupo de botones estilo barra */
        .botonera {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .boton {
            background-color: #e0e0e0;
            border: 1px solid #aaa;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .boton:hover {
            background-color: #ccc;
        }

        /* Botones especiales (activo, etc.) */
        .boton-verde {
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        .boton-verde:hover {
            background-color: #45a049;
        }

        /* Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #e0e0e0;
            font-weight: bold;
        }

        /* Para la fila de números o códigos */
        .codigo-linea {
            font-family: monospace;
            font-size: 14px;
            margin: 5px 0;
        }

        hr {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Sección: OFICINA (título principal) -->
    <div class="seccion fondo-azul">
        <div class="titulo-oficina">OFICINA</div>
    </div>

    <!-- Sección: UNIDAD y Nivel Central -->
    <div class="seccion">
        <div class="unidad">UNIDAD: 0252</div>
        <div>Nivel Central</div>
    </div>

    <!-- Sección: OFICINA (repetido) y Observación -->
    <div class="seccion fondo-gris">
        <div class="titulo-oficina">OFICINA</div>
        <div class="observacion">Oficina Observación</div>
    </div>

    <!-- Sección: Código / Dirección -->
    <div class="seccion">
        <div class="codigo-linea">1 100 DIRECCION INLASAA</div>
    </div>

    <!-- Sección: Botones de ACTIVO, Nuevo, Modificar, Activar, Inactivar -->
    <div class="seccion fondo-azul">
        <div class="botonera">
            <button class="boton boton-verde">ACTIVO</button>
            <button class="boton">Nuevo</button>
            <button class="boton">Modificar</button>
            <button class="boton">Activar</button>
            <button class="boton">Inactivar</button>
        </div>
    </div>

    <!-- Tabla de personal -->
    <div class="seccion">
        <table>
            <thead>
                <tr>
                    <th>Cód.</th>
                    <th>Responsable</th>
                    <th>Cargo</th>
                    <th>CI</th>
                    <th>Expedido</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>DRA. GLADYS GUIROGA</td>
                    <td>DIRECTORA</td>
                    <td></td>
                    <td></td>
                    <td>ACTIVO</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>DR. WALTER AGREDA COCA</td>
                    <td>DIRECTOR GENERAL EJECUTIVO</td>
                    <td></td>
                    <td></td>
                    <td>ACTIVO</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Línea con el número 2 (posiblemente un código) -->
    <div class="seccion">
        <div class="codigo-linea">2</div>
    </div>

    <!-- Barra de botones final: Arriba, Invertir, Nueva, Modificar, Guardar, Deshacer, Salir -->
    <div class="seccion fondo-gris">
        <div class="botonera">
            <button class="boton">Arriba</button>
            <button class="boton">Invertir</button>
            <button class="boton">Nueva</button>
            <button class="boton">Modificar</button>
            <button class="boton">Guardar</button>
            <button class="boton">Deshacer</button>
            <button class="boton">Salir</button>
        </div>
    </div>
</div>

</body>
</html>
